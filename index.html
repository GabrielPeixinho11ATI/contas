<!DOCTYPE html>
<html lang="pt-br" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bills Pro V10 - Organizador Financeiro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #0A0A0A;
            --card: #161616;
            --border: #262626;
            --text: #FFFFFF;
            --text-dim: #A1A1AA;
            --accent: #BB86FC;
            --success: #10B981;
            --danger: #EF4444;
            --radius-xl: 28px;
            --radius-lg: 18px;
            --sidebar-w: 280px;
            --calendar-w: 340px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: var(--bg);
            color: var(--text);
            overflow-x: hidden;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* === SCROLLBAR (PC) === */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 10px;
        }

        /* === LAYOUT SHELL === */
        .app-shell {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .desktop-only {
            display: none;
        }

        .main-content {
            flex: 1;
            width: 100%;
            max-width: 550px;
            margin: 0 auto;
            padding-bottom: 110px;
        }

        /* === MOBILE HEADER === */
        .mobile-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            background: var(--bg);
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid var(--border);
        }

        .brand h1 {
            font-size: 1.2rem;
            font-weight: 800;
            color: var(--accent);
            letter-spacing: -0.5px;
        }

        .header-tools {
            display: flex;
            gap: 8px;
        }

        .tool-btn {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            width: 42px;
            height: 42px;
            color: var(--text);
            cursor: pointer;
            display: grid;
            place-items: center;
            font-size: 1.1rem;
        }

        /* === DASHBOARD HERO === */
        .dash-hero {
            padding: 25px 20px;
        }

        .total-display-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius-xl);
            padding: 40px 25px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
            margin-bottom: 25px;
            position: relative;
            overflow: hidden;
        }

        .total-display-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, var(--accent) 0%, transparent 70%);
            opacity: 0.05;
            pointer-events: none;
        }

        .label-sm {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-dim);
            font-weight: 800;
            margin-bottom: 8px;
        }

        .val-lg {
            font-size: 3rem;
            font-weight: 900;
            letter-spacing: -2px;
            line-height: 1;
        }

        .val-paid {
            color: var(--success);
            font-weight: 800;
            font-size: 0.9rem;
            margin-top: 15px;
        }

        /* MEMBER GRID (MOBILE 2x2) */
        .member-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 30px;
        }

        .member-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 18px;
            position: relative;
        }

        .member-card::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 18px;
            right: 18px;
            height: 3px;
            background: var(--accent);
            border-radius: 10px 10px 0 0;
            opacity: 0.3;
        }

        .member-name {
            font-size: 0.7rem;
            font-weight: 800;
            color: var(--text-dim);
            text-transform: uppercase;
            margin-bottom: 6px;
        }

        .member-val {
            font-size: 1.15rem;
            font-weight: 850;
        }

        /* === BILL LIST === */
        .list-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            font-size: 0.9rem;
            font-weight: 800;
            color: var(--text-dim);
            text-transform: uppercase;
        }

        .bill-stack {
            display: grid;
            gap: 12px;
        }

        .bill-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 20px;
            transition: 0.25s;
        }

        .b-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
        }

        .b-bank {
            font-size: 0.65rem;
            font-weight: 900;
            padding: 4px 10px;
            border-radius: 6px;
            color: #FFF;
            text-transform: uppercase;
        }

        .b-price {
            font-size: 1.2rem;
            font-weight: 900;
        }

        .b-title {
            font-size: 1.05rem;
            font-weight: 750;
            margin-bottom: 15px;
            display: block;
        }

        .b-bottom {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 15px;
            border-top: 1px solid var(--border);
        }

        .b-meta {
            font-size: 0.75rem;
            color: var(--text-dim);
            font-weight: 700;
        }

        .b-actions {
            display: flex;
            gap: 8px;
        }

        .action-circle {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            display: grid;
            place-items: center;
            font-size: 1rem;
        }

        .btn-check {
            background: var(--success);
            color: #000;
            font-weight: 900;
        }

        .btn-edit {
            background: var(--border);
            color: var(--text);
        }

        .btn-del {
            background: transparent;
            color: var(--danger);
            opacity: 0.4;
        }

        .faded {
            opacity: 0.4;
            filter: grayscale(1);
        }

        /* === FAB MOBILE === */
        .fab {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 65px;
            height: 65px;
            background: var(--accent);
            color: #000;
            border-radius: 50%;
            border: none;
            font-size: 2.2rem;
            font-weight: 800;
            box-shadow: 0 15px 40px rgba(187, 134, 252, 0.4);
            z-index: 1000;
            cursor: pointer;
            display: grid;
            place-items: center;
        }

        /* === DESKTOP 3-COLUMNS === */
        @media (min-width: 1024px) {
            .app-shell {
                display: grid;
                grid-template-columns: var(--sidebar-w) 1fr var(--calendar-w);
                height: 100vh;
            }

            .mobile-header,
            .fab {
                display: none;
            }

            .desktop-only {
                display: flex;
            }

            .main-content {
                max-width: none;
                margin: 0;
                padding: 40px 60px;
                overflow-y: auto;
            }

            /* LEFT SIDEBAR */
            .sidebar-l {
                background: var(--card);
                border-right: 1px solid var(--border);
                padding: 40px 30px;
                flex-direction: column;
            }

            .sidebar-l h1 {
                font-size: 1.6rem;
                font-weight: 900;
                margin-bottom: 35px;
                color: var(--accent);
            }

            .pc-cta-btn {
                width: 100%;
                padding: 18px;
                background: var(--accent);
                color: #000;
                border: none;
                border-radius: 16px;
                font-weight: 900;
                margin-bottom: 40px;
                cursor: pointer;
                font-size: 1rem;
                box-shadow: 0 10px 25px rgba(187, 134, 252, 0.2);
            }

            .nav-sec h3 {
                font-size: 0.75rem;
                color: var(--text-dim);
                text-transform: uppercase;
                margin-bottom: 15px;
                letter-spacing: 1px;
            }

            .side-filters {
                display: flex;
                flex-direction: column;
                gap: 8px;
            }

            .filter-item {
                padding: 14px;
                border-radius: 12px;
                background: transparent;
                border: 1px solid transparent;
                color: var(--text-dim);
                text-align: left;
                cursor: pointer;
                font-weight: 700;
                transition: 0.2s;
            }

            .filter-item.active {
                background: var(--bg);
                border-color: var(--border);
                color: var(--accent);
            }

            .filter-item:hover:not(.active) {
                background: rgba(255, 255, 255, 0.03);
            }

            .sidebar-footer {
                margin-top: auto;
                display: flex;
                gap: 10px;
            }

            .side-tool {
                flex: 1;
                padding: 14px;
                border-radius: 12px;
                background: var(--bg);
                border: 1px solid var(--border);
                color: var(--text);
                cursor: pointer;
                display: grid;
                place-items: center;
                font-size: 1.2rem;
            }

            /* CENTER CONTENT */
            .pc-dash-top {
                display: flex;
                justify-content: space-between;
                align-items: center;
                margin-bottom: 30px;
            }

            .pc-dash-top h2 {
                font-size: 2.2rem;
                font-weight: 900;
                letter-spacing: -1px;
            }

            .member-grid {
                grid-template-columns: repeat(4, 1fr);
                gap: 20px;
            }

            /* TABLE PC */
            .pc-table-box {
                background: var(--card);
                border: 1px solid var(--border);
                border-radius: var(--radius-lg);
                overflow: hidden;
            }

            .pc-table {
                width: 100%;
                border-collapse: collapse;
            }

            .pc-table th {
                text-align: left;
                padding: 18px 20px;
                background: rgba(255, 255, 255, 0.02);
                font-size: 0.7rem;
                color: var(--text-dim);
                text-transform: uppercase;
                border-bottom: 1px solid var(--border);
            }

            .pc-table td {
                padding: 20px;
                border-bottom: 1px solid var(--border);
                font-weight: 600;
                font-size: 0.95rem;
            }

            .pc-table tr:last-child td {
                border: none;
            }

            .price-td {
                font-weight: 800;
                color: var(--accent);
                font-size: 1.1rem;
            }

            /* RIGHT SIDEBAR (CALENDAR) */
            .sidebar-r {
                background: var(--card);
                border-left: 1px solid var(--border);
                padding: 40px 25px;
                flex-direction: column;
            }
        }

        /* === MODALS === */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(12px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 5000;
            padding: 20px;
        }

        .modal-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius-xl);
            width: 100%;
            max-width: 450px;
            padding: 35px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6);
        }

        .m-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .m-header h2 {
            font-weight: 800;
            font-size: 1.3rem;
        }

        .close-m {
            background: none;
            border: none;
            color: var(--text-dim);
            font-size: 1.8rem;
            cursor: pointer;
        }

        .f-group {
            margin-bottom: 22px;
        }

        .f-group label {
            display: block;
            font-size: 0.8rem;
            font-weight: 800;
            color: var(--text-dim);
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .f-group input,
        .f-group select {
            width: 100%;
            padding: 16px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 14px;
            color: var(--text);
            font-weight: 600;
            font-size: 1rem;
        }

        .f-group input:focus {
            border-color: var(--accent);
            outline: none;
        }

        .btn-confirm {
            width: 100%;
            padding: 18px;
            background: var(--accent);
            color: #000;
            border: none;
            border-radius: 16px;
            font-weight: 900;
            font-size: 1.1rem;
            cursor: pointer;
            margin-top: 10px;
        }

        /* === CALENDAR COMPONENT === */
        .cal-ctrl {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .cal-arrow {
            background: none;
            border: 1px solid var(--border);
            color: var(--text);
            width: 36px;
            height: 36px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1.2rem;
        }

        .cal-title {
            font-weight: 800;
            font-size: 1.1rem;
        }

        .cal-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 6px;
        }

        .cal-h {
            font-size: 0.65rem;
            font-weight: 900;
            color: var(--text-dim);
            text-align: center;
            padding-bottom: 10px;
        }

        .cal-d {
            aspect-ratio: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 0.95rem;
            font-weight: 800;
            border-radius: 12px;
            cursor: pointer;
            border: 1px solid transparent;
            position: relative;
        }

        .cal-d.today {
            border-color: var(--accent);
            color: var(--accent);
        }

        .cal-d.active {
            background: var(--accent);
            color: #000;
        }

        .cal-dots {
            display: flex;
            gap: 2px;
            position: absolute;
            bottom: 5px;
        }

        .dot {
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background: var(--accent);
        }

        /* SETTINGS TAGS */
        .tag-wrap {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 15px;
        }

        .tag-pill {
            background: var(--bg);
            border: 1px solid var(--border);
            padding: 10px 15px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.85rem;
            font-weight: 700;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate {
            animation: fadeIn 0.3s ease-out forwards;
        }
    </style>
</head>

<body>
    <div class="app-shell">
        <!-- SIDEBAR LEFT (PC) -->
        <aside class="desktop-only sidebar-l">
            <h1 id="brand-l">Bills Pro V10</h1>
            <button class="pc-cta-btn" onclick="openBillForm()">+ Adicionar Conta</button>
            <nav class="nav-sec">
                <h3>Filtrar Pasta</h3>
                <div id="pc-filters" class="side-filters"></div>
            </nav>
            <div class="sidebar-footer">
                <button class="side-tool" onclick="openSettings()" title="Configurações">⚙️</button>
                <button class="side-tool" onclick="exportData()" title="Exportar Backup">📥</button>
                <button class="side-tool" onclick="triggerImport()" title="Importar Backup">📤</button>
            </div>
        </aside>

        <!-- MAIN AREA -->
        <main class="main-content">
            <!-- Mobile Header -->
            <header class="mobile-header">
                <div class="brand">
                    <h1 id="brand-m">Bills Pro V10</h1>
                </div>
                <div class="header-tools">
                    <button class="tool-btn" onclick="exportData()">📥</button>
                    <button class="tool-btn" onclick="triggerImport()">📤</button>
                    <button class="tool-btn" onclick="openSettings()">⚙️</button>
                    <button class="tool-btn" onclick="openMobileCal()">📅</button>
                </div>
            </header>

            <section class="dash-hero">
                <!-- Main Total -->
                <div class="total-display-card">
                    <p class="label-sm">Total Geral Pendente</p>
                    <h1 id="total-geral" class="val-lg">R$ 0,00</h1>
                    <p class="val-paid">Pago este mês: <span id="total-pago">R$ 0,00</span></p>
                </div>

                <!-- Folder Grid -->
                <div id="folder-grid" class="member-grid">
                    <!-- Gabriel, Gabi, Papai, Mãe -->
                </div>

                <!-- Desktop Header Section -->
                <div class="pc-dash-top desktop-only">
                    <h2 id="month-title-pc">Março</h2>
                    <div class="cal-ctrl" style="margin-bottom:0; gap:12px;">
                        <button class="cal-arrow" onclick="moveMonth(-1)">‹</button>
                        <button class="cal-arrow" onclick="moveMonth(1)">›</button>
                    </div>
                </div>

                <!-- Section Header -->
                <div class="list-header">
                    <span>Fluxo de Contas</span>
                    <span id="month-label-m" class="mobile-only" style="color:var(--accent)">Março 2026</span>
                </div>

                <!-- List / Table Area -->
                <div id="bill-render-area">
                    <!-- Cards (Mobile) or Table (PC) -->
                </div>

                <details style="margin-top:30px; cursor:pointer;" open>
                    <summary
                        style="text-align:center; color:var(--text-dim); font-weight:800; font-size:0.8rem; list-style:none; padding:15px; border-top:1px solid var(--border);">
                        Histórico de Pagas (<span id="paid-count">0</span>)
                    </summary>
                    <div id="bill-history" class="bill-stack faded" style="margin-top:20px;"></div>
                </details>
            </section>
        </main>

        <!-- SIDEBAR RIGHT (PC CALENDAR) -->
        <aside class="desktop-only sidebar-r">
            <div class="cal-ctrl">
                <button class="cal-arrow" onclick="moveMonth(-1)">‹</button>
                <h3 id="cal-title-pc" class="cal-title">Março 2026</h3>
                <button class="cal-arrow" onclick="moveMonth(1)">›</button>
            </div>
            <div id="cal-grid-pc" class="cal-grid"></div>
        </aside>

        <!-- MOBILE FAB -->
        <button class="fab" onclick="openBillForm()">+</button>
    </div>

    <!-- MODAL: ADD/EDIT BILL -->
    <div id="modal-bill" class="modal-overlay">
        <div class="modal-card">
            <div class="m-header">
                <h2 id="modal-title">Novo Lançamento</h2>
                <button class="close-m" onclick="closeModals()">×</button>
            </div>
            <form id="bill-form">
                <input type="hidden" id="edit-id">
                <div class="f-group">
                    <label>Título da Conta</label>
                    <input type="text" id="in-title" required placeholder="Ex: Aluguel, Luz, Cartão">
                </div>
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:15px;">
                    <div class="f-group">
                        <label>Valor (R$)</label>
                        <input type="number" id="in-value" step="0.01" required>
                    </div>
                    <div class="f-group">
                        <label>Data Vencimento</label>
                        <input type="date" id="in-date" required>
                    </div>
                </div>
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:15px;">
                    <div class="f-group">
                        <label>Pasta (Membro)</label>
                        <select id="in-member" required></select>
                    </div>
                    <div class="f-group">
                        <label>Banco / Cartão</label>
                        <select id="in-bank" required></select>
                    </div>
                </div>
                <button type="submit" class="btn-confirm">Salvar Despesa</button>
            </form>
        </div>
    </div>

    <!-- MODAL: CALENDAR (MOBILE) -->
    <div id="modal-cal" class="modal-overlay">
        <div class="modal-card">
            <div class="m-header">
                <div style="display:flex; align-items:center; gap:20px;">
                    <button class="cal-arrow" onclick="moveMonth(-1)">‹</button>
                    <h3 id="cal-title-m" class="cal-title">Março 2026</h3>
                    <button class="cal-arrow" onclick="moveMonth(1)">›</button>
                </div>
                <button class="close-m" onclick="closeModals()">×</button>
            </div>
            <div id="cal-grid-m" class="cal-grid"></div>
        </div>
    </div>

    <!-- MODAL: SETTINGS -->
    <div id="modal-settings" class="modal-overlay">
        <div class="modal-card" style="max-height:85vh; overflow-y:auto;">
            <div class="m-header">
                <h2>Ajustes</h2>
                <button class="close-m" onclick="closeModals()">×</button>
            </div>
            <div class="f-group">
                <label>Título do Aplicativo</label>
                <input type="text" id="set-app-name" oninput="saveAppName(this.value)">
            </div>
            <div class="f-group">
                <label>Gestão de Bancos</label>
                <div style="display:flex; gap:10px; margin-bottom:15px;">
                    <input type="text" id="new-bnk-name" placeholder="Nome...">
                    <input type="color" id="new-bnk-color" value="#BB86FC" style="width:60px; padding:0; height:50px;">
                    <button class="tool-btn" onclick="addBank()"
                        style="background:var(--accent); color:#000;">+</button>
                </div>
                <div id="bank-tags-list" class="tag-wrap"></div>
            </div>
        </div>
    </div>

    <input type="file" id="import-trigger" style="display:none;" onchange="importJSON(event)">

    <script>
        /**
         * BILLS PRO V10 - ENGINE
         * 100% Client-Side | LocalStorage
         */

        let state = {
            appName: "Bills Pro V10",
            members: ["Gabriel", "Gabi", "Papai", "Mãe"],
            banks: [
                { name: "Santander", color: "#ec1c24" },
                { name: "Nubank", color: "#8a05be" },
                { name: "Carrefour", color: "#0050ff" },
                { name: "Pernambucanas", color: "#0056b3" },
                { name: "Riachuelo", color: "#000000" },
                { name: "Cartão Mais", color: "#003366" },
                { name: "Mercado Pago", color: "#009ee3" }
            ],
            bills: [],
            viewDate: new Date(),
            filterMember: "Tudo"
        };

        const STORAGE_KEY = 'billspro_v10_final';

        function save() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
            refreshUI();
        }

        function load() {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) {
                const data = JSON.parse(saved);
                state = { ...state, ...data };
                state.viewDate = new Date(state.viewDate);
            }
            refreshUI();
        }

        // --- RENDER ENGINE ---
        function refreshUI() {
            const m = state.viewDate.getMonth();
            const y = state.viewDate.getFullYear();
            const monthNames = ["Janeiro", "Fevereiro", "Março", "Abril", "Maio", "Junho", "Julho", "Agosto", "Setembro", "Outubro", "Novembro", "Dezembro"];
            const dateFull = `${monthNames[m]} ${y}`;

            // Sync Branding
            document.getElementById('brand-l').innerText = state.appName;
            document.getElementById('brand-m').innerText = state.appName;
            document.getElementById('set-app-name').value = state.appName;
            document.title = state.appName;

            // Labels
            document.getElementById('cal-title-pc').innerText = dateFull;
            document.getElementById('cal-title-m').innerText = dateFull;
            document.getElementById('month-label-m').innerText = dateFull;
            document.getElementById('month-title-pc').innerText = monthNames[m];

            const currentMonthBills = state.bills.filter(b => {
                const d = new Date(b.date);
                return d.getUTCMonth() === m && d.getUTCFullYear() === y;
            });

            // Calculations
            const unpaid = currentMonthBills.filter(b => !b.paid);
            const paid = currentMonthBills.filter(b => b.paid);
            const totalUnpaid = unpaid.reduce((acc, b) => acc + parseFloat(b.value), 0);
            const totalPaid = paid.reduce((acc, b) => acc + parseFloat(b.value), 0);

            document.getElementById('total-geral').innerText = formatBRL(totalUnpaid);
            document.getElementById('total-pago').innerText = formatBRL(totalPaid);

            // Folder Grid
            const fGrid = document.getElementById('folder-grid');
            fGrid.innerHTML = '';
            state.members.forEach(mem => {
                const memTotal = unpaid.filter(b => b.member === mem).reduce((acc, b) => acc + parseFloat(b.value), 0);
                fGrid.innerHTML += `
                    <div class="member-card animate">
                        <p class="member-name">${mem}</p>
                        <p class="member-val">${formatBRL(memTotal)}</p>
                    </div>
                `;
            });

            // PC Filters
            const filterBox = document.getElementById('pc-filters');
            filterBox.innerHTML = '';
            ["Tudo", ...state.members].forEach(f => {
                const btn = document.createElement('button');
                btn.className = `filter-item ${state.filterMember === f ? 'active' : ''}`;
                btn.innerText = f;
                btn.onclick = () => { state.filterMember = f; refreshUI(); };
                filterBox.appendChild(btn);
            });

            // Bill List / Table
            renderBills(currentMonthBills);

            // Calendars
            renderCalendar('pc');
            renderCalendar('m');

            // Settings Tags
            renderBankSettings();
        }

        function renderBills(allBills) {
            const container = document.getElementById('bill-render-area');
            const history = document.getElementById('bill-history');
            container.innerHTML = '';
            history.innerHTML = '';

            const filtered = allBills.filter(b => state.filterMember === "Tudo" || b.member === state.filterMember);
            const unpaid = filtered.filter(b => !b.paid);
            const paid = filtered.filter(b => b.paid);

            document.getElementById('paid-count').innerText = paid.length;

            const isPC = window.innerWidth >= 1024;

            if (isPC && (unpaid.length > 0 || paid.length > 0)) {
                const tableWrap = document.createElement('div');
                tableWrap.className = 'pc-table-box animate';
                tableWrap.innerHTML = `
                    <table class="pc-table">
                        <thead>
                            <tr>
                                <th>Status</th>
                                <th>Descrição</th>
                                <th>Membro</th>
                                <th>Banco</th>
                                <th>Dia</th>
                                <th>Valor</th>
                                <th>Ações</th>
                            </tr>
                        </thead>
                        <tbody id="bill-tbody"></tbody>
                    </table>
                `;
                container.appendChild(tableWrap);
                const tbody = document.getElementById('bill-tbody');

                [...unpaid, ...paid].forEach(b => {
                    const bank = state.banks.find(bk => bk.name === b.bank) || { color: '#666' };
                    const tr = document.createElement('tr');
                    if (b.paid) tr.className = 'faded';
                    tr.innerHTML = `
                        <td>${b.paid ? '✅' : '⏳'}</td>
                        <td style="font-weight:800">${b.title}</td>
                        <td>${b.member}</td>
                        <td><span class="b-bank" style="background:${bank.color}">${b.bank}</span></td>
                        <td>${new Date(b.date).getUTCDate()}</td>
                        <td class="price-td">${formatBRL(b.value)}</td>
                        <td>
                            <div class="b-actions">
                                ${!b.paid ? `<button class="action-circle btn-check" onclick="payBill(${b.id})">✓</button>` : ''}
                                <button class="action-circle btn-edit" onclick="editBill(${b.id})">✏️</button>
                                <button class="action-circle btn-del" onclick="delBill(${b.id})">×</button>
                            </div>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });
            } else {
                unpaid.forEach(b => container.appendChild(createBillCard(b)));
                paid.forEach(b => history.appendChild(createBillCard(b)));

                if (unpaid.length === 0) {
                    container.innerHTML = `<div style="text-align:center; padding:50px; opacity:0.3; font-weight:800; font-size:0.9rem;">Tudo limpo por aqui! ✨</div>`;
                }
            }
        }

        function createBillCard(b) {
            const bank = state.banks.find(bk => bk.name === b.bank) || { color: '#666' };
            const div = document.createElement('div');
            div.className = `bill-card animate ${b.paid ? 'faded' : ''}`;
            div.innerHTML = `
                <div class="b-top">
                    <span class="b-bank" style="background:${bank.color}">${b.bank}</span>
                    <span class="b-price">${formatBRL(b.value)}</span>
                </div>
                <span class="b-title">${b.title}</span>
                <div class="b-bottom">
                    <span class="b-meta">Dia ${new Date(b.date).getUTCDate()} • ${b.member}</span>
                    <div class="b-actions">
                        ${!b.paid ? `<button class="action-circle btn-check" onclick="payBill(${b.id})">✓</button>` : '✅'}
                        <button class="action-circle btn-edit" onclick="editBill(${b.id})">✏️</button>
                        <button class="action-circle btn-del" onclick="delBill(${b.id})">×</button>
                    </div>
                </div>
            `;
            return div;
        }

        function renderCalendar(type) {
            const grid = document.getElementById(type === 'pc' ? 'cal-grid-pc' : 'cal-grid-m');
            grid.innerHTML = '';
            ["D", "S", "T", "Q", "Q", "S", "S"].forEach(h => grid.innerHTML += `<div class="cal-h">${h}</div>`);

            const y = state.viewDate.getFullYear(), m = state.viewDate.getMonth();
            const first = new Date(y, m, 1).getDay(), last = new Date(y, m + 1, 0).getDate();

            for (let i = 0; i < first; i++) grid.innerHTML += '<div></div>';

            for (let d = 1; d <= last; d++) {
                const day = document.createElement('div');
                day.className = 'cal-d';
                day.innerText = d;

                const dayBills = state.bills.filter(b => {
                    const dt = new Date(b.date);
                    return dt.getUTCDate() === d && dt.getUTCMonth() === m && dt.getUTCFullYear() === y && !b.paid;
                });

                if (dayBills.length > 0) {
                    const dots = document.createElement('div'); dots.className = 'cal-dots';
                    dayBills.slice(0, 3).forEach(b => dots.innerHTML += `<div class="dot"></div>`);
                    day.appendChild(dots);
                }

                if (d === new Date().getDate() && m === new Date().getMonth() && y === new Date().getFullYear()) day.classList.add('today');

                day.onclick = () => { if (type === 'm') closeModals(); };
                grid.appendChild(day);
            }
        }

        // --- ACTIONS ---
        function openBillForm() {
            document.getElementById('modal-title').innerText = "Novo Lançamento";
            document.getElementById('edit-id').value = "";
            document.getElementById('bill-form').reset();

            const mSel = document.getElementById('in-member');
            const bSel = document.getElementById('in-bank');
            mSel.innerHTML = state.members.map(m => `<option value="${m}">${m}</option>`).join('');
            bSel.innerHTML = state.banks.map(b => `<option value="${b.name}">${b.name}</option>`).join('');

            document.getElementById('modal-bill').style.display = 'flex';
        }

        function editBill(id) {
            const b = state.bills.find(x => x.id === id);
            openBillForm();
            document.getElementById('modal-title').innerText = "Editar Conta";
            document.getElementById('edit-id').value = b.id;
            document.getElementById('in-title').value = b.title;
            document.getElementById('in-value').value = b.value;
            document.getElementById('in-date').value = b.date;
            document.getElementById('in-member').value = b.member;
            document.getElementById('in-bank').value = b.bank;
        }

        document.getElementById('bill-form').onsubmit = (e) => {
            e.preventDefault();
            const id = document.getElementById('edit-id').value;
            const data = {
                id: id ? parseInt(id) : Date.now(),
                title: document.getElementById('in-title').value,
                value: document.getElementById('in-value').value,
                date: document.getElementById('in-date').value,
                member: document.getElementById('in-member').value,
                bank: document.getElementById('in-bank').value,
                paid: id ? state.bills.find(x => x.id == id).paid : false
            };
            if (id) {
                const idx = state.bills.findIndex(x => x.id == id);
                state.bills[idx] = data;
            } else {
                state.bills.push(data);
            }
            closeModals();
            save();
        };

        function payBill(id) {
            const b = state.bills.find(x => x.id === id);
            b.paid = true;
            save();
        }

        function delBill(id) {
            if (confirm('Deletar permanentemente?')) {
                state.bills = state.bills.filter(x => x.id !== id);
                save();
            }
        }

        function moveMonth(dir) {
            state.viewDate.setMonth(state.viewDate.getMonth() + dir);
            refreshUI();
        }

        function formatBRL(v) { return parseFloat(v).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' }); }

        // --- BACKUP ---
        function exportData() {
            const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            const cleanName = state.appName.toLowerCase().replace(/\s+/g, '_');
            a.download = `backup_${cleanName}.json`;
            a.click();
        }

        function triggerImport() { document.getElementById('import-trigger').click(); }

        function importJSON(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                try {
                    const data = JSON.parse(ev.target.result);
                    state = { ...state, ...data };
                    state.viewDate = new Date();
                    save();
                    alert('Backup restaurado com sucesso! 🛡️');
                } catch (err) { alert('Arquivo de backup inválido.'); }
            };
            reader.readAsText(file);
        }

        // --- SETTINGS ---
        function saveAppName(val) { state.appName = val || "Bills Pro V10"; save(); }

        function addBank() {
            const n = document.getElementById('new-bnk-name'), c = document.getElementById('new-bnk-color');
            if (n.value) {
                state.banks.push({ name: n.value, color: c.value });
                n.value = '';
                save();
            }
        }

        function removeBank(name) {
            if (confirm(`Remover banco ${name}?`)) {
                state.banks = state.banks.filter(b => b.name !== name);
                save();
            }
        }

        function renderBankSettings() {
            const list = document.getElementById('bank-tags-list');
            list.innerHTML = '';
            state.banks.forEach(b => {
                list.innerHTML += `
                    <div class="tag-pill">
                        <div style="width:14px; height:14px; border-radius:50%; background:${b.color}"></div>
                        <span>${b.name}</span>
                        <span onclick="removeBank('${b.name}')" style="cursor:pointer; color:var(--danger); font-weight:900;">×</span>
                    </div>
                `;
            });
        }

        // --- UI UTILS ---
        function openMobileCal() { document.getElementById('modal-cal').style.display = 'flex'; }
        function openSettings() { document.getElementById('modal-settings').style.display = 'flex'; }
        function closeModals() { document.querySelectorAll('.modal-overlay').forEach(m => m.style.display = 'none'); }

        window.onclick = (e) => { if (e.target.classList.contains('modal-overlay')) closeModals(); };
        window.onresize = refreshUI;

        load();
    </script>
</body>

</html>
