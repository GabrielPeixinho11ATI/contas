<!DOCTYPE html>
<html lang="pt-br" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bill Organizer V9 - Senior Pro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="app-shell">
        <!-- Minimalist Header -->
        <header class="top-nav">
            <div class="nav-left">
                <button id="export-json" class="icon-outline" title="Exportar Backup">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3" />
                    </svg>
                </button>
                <button id="import-trigger" class="icon-outline" title="Importar Backup">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12" />
                    </svg>
                </button>
                <input type="file" id="import-file" style="display: none;" accept=".json">
            </div>

            <div class="current-view-label">
                <span id="label-month">Março</span>
                <span id="label-year">2026</span>
            </div>

            <div class="nav-right">
                <button id="theme-toggle" class="icon-outline">🌙</button>
            </div>
        </header>

        <!-- Centered Dashboard -->
        <section class="hero-dashboard">
            <div class="hero-card">
                <p class="hero-subtitle">Total Pendente</p>
                <h1 id="total-pending-val">R$ 0,00</h1>
                <div class="hero-footer">
                    <span>Pago: <strong id="total-paid-val">R$ 0,00</strong></span>
                </div>
            </div>
        </section>

        <!-- Quick Access -->
        <section class="action-bar">
            <button id="btn-open-cal" class="secondary-action">📅 Ver Calendário</button>
            <button id="btn-open-settings" class="secondary-action">⚙️ Ajustes</button>
        </section>

        <!-- Main Feed -->
        <main class="feed-container">
            <div class="feed-header">
                <h2>Suas Contas</h2>
                <div id="filter-pills" class="scroll-pills"></div>
            </div>

            <div id="pending-stack" class="bill-stack"></div>

            <details class="paid-history">
                <summary>Contas Pagas (<span id="paid-count">0</span>)</summary>
                <div id="paid-stack" class="bill-stack faded"></div>
            </details>
        </main>

        <!-- FAB -->
        <button id="fab-add" class="fab-main">+</button>
    </div>

    <!-- MODAL: CALENDÁRIO DINÂMICO (Navigation Hub) -->
    <div id="modal-cal" class="modal-overlay">
        <div class="modal-card calendar-sheet">
            <div class="modal-top">
                <div class="cal-nav">
                    <button id="cal-prev" class="cal-arrow">‹</button>
                    <h2 id="cal-month-title">Março 2026</h2>
                    <button id="cal-next" class="cal-arrow">›</button>
                </div>
                <button class="modal-close">×</button>
            </div>

            <div class="cal-body">
                <div class="cal-week-header">
                    <span>Dom</span><span>Seg</span><span>Ter</span><span>Qua</span><span>Qui</span><span>Sex</span><span>Sáb</span>
                </div>
                <div id="cal-grid" class="cal-grid-layout"></div>
            </div>
            <p class="cal-info-text">Troque o mês para atualizar o dashboard.</p>
        </div>
    </div>

    <!-- MODAL: NOVA CONTA -->
    <div id="modal-form" class="modal-overlay">
        <div class="modal-card">
            <div class="modal-header">
                <h2>Nova Despesa</h2>
                <button class="modal-close">×</button>
            </div>
            <form id="form-bill">
                <div class="form-group">
                    <label>Título</label>
                    <input type="text" id="in-title" placeholder="Ex: Internet, Aluguel" required>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Valor (R$)</label>
                        <input type="number" id="in-value" step="0.01" required>
                    </div>
                    <div class="form-group">
                        <label>Vencimento</label>
                        <input type="date" id="in-date" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Membro</label>
                        <select id="in-member" required></select>
                    </div>
                    <div class="form-group">
                        <label>Banco</label>
                        <select id="in-bank" required></select>
                    </div>
                </div>
                <button type="submit" class="btn-primary">Salvar Despesa</button>
            </form>
        </div>
    </div>

    <!-- MODAL: AJUSTES -->
    <div id="modal-settings" class="modal-overlay">
        <div class="modal-card scrollable">
            <div class="modal-header">
                <h2>Ajustes & Cores</h2>
                <button class="modal-close">×</button>
            </div>

            <section class="conf-section">
                <h3>Membros</h3>
                <div class="add-row">
                    <input type="text" id="new-mem" placeholder="Nome...">
                    <button id="add-mem-btn">+</button>
                </div>
                <div id="set-members-list" class="tag-cloud"></div>
            </section>

            <section class="conf-section">
                <h3>Bancos & Cores</h3>
                <div class="add-row">
                    <input type="text" id="new-bnk" placeholder="Banco...">
                    <input type="color" id="bnk-color" value="#3b82f6">
                    <button id="add-bnk-btn">+</button>
                </div>
                <div id="set-banks-list" class="tag-cloud"></div>
            </section>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
