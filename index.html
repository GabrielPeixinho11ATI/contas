<!DOCTYPE html>
<html lang="pt-br" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title id="app-title">Bills Pro V11</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="app-shell">
        <!-- HEADER (UNIFIED) -->
        <header class="app-header">
            <div class="header-brand">
                <h1 id="header-brand-name">Bills Pro V11</h1>
            </div>
            <div class="header-tools">
                <button class="icon-btn" onclick="toggleTheme()" title="Trocar Tema">🌓</button>
                <button class="icon-btn" onclick="exportData()" title="Exportar JSON">📥</button>
                <button class="icon-btn" onclick="triggerImport()" title="Importar JSON">📤</button>
                <button class="icon-btn" onclick="openSettings()" title="Configurações">⚙️</button>
            </div>
        </header>

        <main class="app-main">
            <!-- SIDEBAR (DRAWER MOBILE / FIXED PC) -->
            <aside class="sidebar">
                <button class="btn-primary btn-add-pc" onclick="openBillModal()"><span class="btn-icon">+</span>
                    Adicionar Conta</button>
                <div class="sidebar-section">
                    <h3>Favoritos & Pastas</h3>
                    <div id="side-folders" class="side-nav-list"></div>
                </div>
            </aside>

            <!-- MAIN CONTENT (CENTRAL) -->
            <div class="content-view">
                <div class="dash-hero">
                    <p class="dash-label">Total Geral Pendente</p>
                    <h1 id="dash-total" class="dash-val-hero">R$ 0,00</h1>
                    <p class="dash-val-sub">Total Pago (Mês): <span id="dash-paid">R$ 0,00</span></p>
                </div>

                <!-- CARDS (ADAPTIVE MOBILE) -->
                <div id="mobile-folder-grid" class="folder-grid mobile-only"></div>

                <div class="view-header">
                    <div class="month-selector">
                        <button class="nav-btn" onclick="navMonth(-1)">‹</button>
                        <span id="current-month-label"></span>
                        <button class="nav-btn" onclick="navMonth(1)">›</button>
                    </div>
                </div>

                <div id="bill-list-pending" class="bill-stack"></div>

                <details class="paid-history" open>
                    <summary>HISTÓRICO DE PAGAS (<span id="count-paid">0</span>) ▾</summary>
                    <div id="bill-list-paid" class="bill-stack paid-item"></div>
                </details>
            </div>

            <!-- CALENDAR PANEL (MODAL MOBILE / FIXED PC) -->
            <aside class="calendar-panel">
                <div class="cal-header">
                    <div class="month-selector" style="width:100%; justify-content:space-between;">
                        <button class="nav-btn" onclick="navMonth(-1)">‹</button>
                        <span id="cal-month-label" style="font-size:1.1rem"></span>
                        <button class="nav-btn" onclick="navMonth(1)">›</button>
                    </div>
                </div>
                <div id="cal-grid" class="cal-grid"></div>
            </aside>
        </main>

        <!-- FAB (MOBILE ONLY) -->
        <button class="fab mobile-only" onclick="openBillModal()">+</button>
    </div>

    <!-- MODAL: ADD/EDIT BILL -->
    <div id="modal-bill" class="modal">
        <div class="modal-box">
            <div class="modal-h">
                <h2 id="modal-bill-title">Novo Lançamento</h2>
                <button class="close-btn" onclick="closeModals()">×</button>
            </div>
            <form id="bill-form">
                <div class="form-group">
                    <label>Descrição</label>
                    <input type="text" id="in-title" required placeholder="Aluguel, Cartão...">
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Valor (R$)</label>
                        <input type="number" step="0.01" id="in-value" required>
                    </div>
                    <div class="form-group">
                        <label>Vencimento</label>
                        <input type="date" id="in-date" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Pasta</label>
                        <select id="in-member" required></select>
                    </div>
                    <div class="form-group">
                        <label>Banco</label>
                        <select id="in-bank" required></select>
                    </div>
                </div>
                <div class="form-actions">
                    <button type="button" class="btn-secondary" onclick="closeModals()">Cancelar</button>
                    <button type="submit" class="btn-primary">Salvar</button>
                </div>
            </form>
        </div>
    </div>

    <!-- MODAL: SETTINGS -->
    <div id="modal-settings" class="modal">
        <div class="modal-box">
            <div class="modal-h">
                <h2>Configurações</h2>
                <button class="close-btn" onclick="closeModals()">×</button>
            </div>
            <div class="form-group">
                <label>Nome do Aplicativo</label>
                <input type="text" id="cfg-app-name" placeholder="Bills Pro V11">
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Pastas</label>
                    <div id="cfg-list-members" class="cfg-list"></div>
                    <button class="btn-text" onclick="addItemConfig('member')">+ ADICIONAR</button>
                </div>
                <div class="form-group">
                    <label>Bancos</label>
                    <div id="cfg-list-banks" class="cfg-list"></div>
                    <button class="btn-text" onclick="addItemConfig('bank')">+ ADICIONAR</button>
                </div>
            </div>
            <div class="form-actions">
                <button type="button" class="btn-secondary" onclick="closeModals()">Fechar</button>
                <button type="button" class="btn-primary" onclick="saveSettings()">Salvar Ajustes</button>
            </div>
        </div>
    </div>

    <input type="file" id="import-input" style="display:none" onchange="handleImport(event)">

    <script src="script.js" defer></script>
</body>

</html>
