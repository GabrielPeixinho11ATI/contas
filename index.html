<!DOCTYPE html>
<html lang="pt-br" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bills Pro V10 - Versão Senior Consolidada</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #0A0A0A;
            --card: #161616;
            --border: #262626;
            --text: #FFFFFF;
            --text-dim: #A1A1AA;
            --accent: #BB86FC;
            --success: #10B981;
            --danger: #EF4444;
            --radius-xl: 28px;
            --radius-lg: 18px;
            --sidebar-w: 280px;
            --calendar-w: 340px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: var(--bg);
            color: var(--text);
            overflow-x: hidden;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            min-height: 100vh;
        }

        button,
        .filter-item {
            cursor: pointer;
            transition: 0.2s;
            border: none;
            outline: none;
        }

        button:active {
            transform: scale(0.96);
        }

        /* === LAYOUT SHELL === */
        .app-shell {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .desktop-only {
            display: none;
        }

        .main-content {
            flex: 1;
            width: 100%;
            max-width: 550px;
            margin: 0 auto;
            padding-bottom: 110px;
        }

        /* === HEADER (MOBILE & PC) === */
        .app-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            background: var(--bg);
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid var(--border);
        }

        .brand h1 {
            font-size: 1.25rem;
            font-weight: 800;
            color: var(--accent);
            letter-spacing: -1px;
        }

        .header-tools {
            display: flex;
            gap: 10px;
        }

        .tool-btn {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 14px;
            width: 44px;
            height: 44px;
            color: var(--text);
            display: grid;
            place-items: center;
            font-size: 1.2rem;
        }

        .tool-btn:hover {
            background: var(--border);
            border-color: var(--accent);
        }

        /* === DASHBOARD === */
        .dash-section {
            padding: 25px 20px;
        }

        .hero-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius-xl);
            padding: 40px 25px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            margin-bottom: 30px;
            position: relative;
            overflow: hidden;
        }

        .label-xs {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-dim);
            font-weight: 800;
            margin-bottom: 10px;
        }

        .val-hero {
            font-size: 3.2rem;
            font-weight: 900;
            letter-spacing: -3px;
            line-height: 1;
            margin-bottom: 15px;
        }

        .val-paid-row {
            font-size: 0.9rem;
            font-weight: 700;
            color: var(--success);
            opacity: 0.9;
        }

        /* MEMBER GRID */
        .folder-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 35px;
        }

        .folder-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 20px;
            position: relative;
        }

        .folder-card::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 15px;
            right: 15px;
            height: 3px;
            background: var(--accent);
            border-radius: 10px;
            opacity: 0.3;
        }

        .folder-name {
            font-size: 0.75rem;
            font-weight: 800;
            color: var(--text-dim);
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .folder-val {
            font-size: 1.25rem;
            font-weight: 900;
            color: var(--text);
        }

        /* === LISTING === */
        .list-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            font-size: 0.85rem;
            font-weight: 800;
            color: var(--text-dim);
            text-transform: uppercase;
        }

        .bill-stack {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .bill-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 22px;
            transition: 0.25s;
        }

        .b-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 15px;
        }

        .bank-badge {
            font-size: 0.65rem;
            font-weight: 900;
            padding: 6px 12px;
            border-radius: 8px;
            color: #FFF;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .b-val {
            font-size: 1.35rem;
            font-weight: 900;
            color: var(--text);
        }

        .b-title {
            font-size: 1.1rem;
            font-weight: 750;
            margin-bottom: 18px;
            display: block;
        }

        .b-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 15px;
            border-top: 1px solid var(--border);
        }

        .b-info {
            font-size: 0.8rem;
            color: var(--text-dim);
            font-weight: 700;
        }

        .b-btns {
            display: flex;
            gap: 10px;
        }

        .circle-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: grid;
            place-items: center;
            font-size: 1.1rem;
        }

        .btn-pay {
            background: var(--success);
            color: #000;
            font-weight: 900;
        }

        .btn-del {
            background: transparent;
            color: var(--danger);
            border: 1px solid var(--border);
            opacity: 0.6;
        }

        .is-paid {
            opacity: 0.4;
            filter: grayscale(1);
        }

        /* === FAB MOBILE === */
        .fab-add {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 68px;
            height: 68px;
            background: var(--accent);
            color: #000;
            border-radius: 50%;
            font-size: 2.2rem;
            font-weight: 800;
            box-shadow: 0 15px 40px rgba(187, 134, 252, 0.4);
            z-index: 2000;
            display: grid;
            place-items: center;
        }

        /* === DESKTOP LAYOUT (3-COLUMNS) === */
        @media (min-width: 1024px) {
            .app-shell {
                display: grid;
                grid-template-columns: var(--sidebar-w) 1fr var(--calendar-w);
                height: 100vh;
                overflow: hidden;
            }

            .fab-add {
                display: none;
            }

            .desktop-only {
                display: flex;
            }

            .main-content {
                max-width: none;
                margin: 0;
                padding: 40px 60px;
                overflow-y: auto;
            }

            /* SIDEBAR L */
            .sidebar-l {
                background: var(--card);
                border-right: 1px solid var(--border);
                padding: 40px 30px;
                flex-direction: column;
                overflow-y: auto;
            }

            .sidebar-l h1 {
                font-size: 1.7rem;
                font-weight: 900;
                margin-bottom: 45px;
                color: var(--accent);
            }

            .pc-add-btn {
                width: 100%;
                padding: 20px;
                background: var(--accent);
                color: #000;
                border-radius: 18px;
                font-weight: 950;
                font-size: 1rem;
                margin-bottom: 50px;
                box-shadow: 0 10px 25px rgba(187, 134, 252, 0.2);
            }

            .pc-add-btn:hover {
                transform: translateY(-3px);
                box-shadow: 0 15px 35px rgba(187, 134, 252, 0.3);
            }

            .nav-group {
                margin-bottom: 40px;
            }

            .nav-group h3 {
                font-size: 0.8rem;
                color: var(--text-dim);
                text-transform: uppercase;
                margin-bottom: 20px;
                letter-spacing: 1px;
            }

            .filter-stack {
                display: flex;
                flex-direction: column;
                gap: 10px;
            }

            .filter-item {
                padding: 16px;
                border-radius: 14px;
                background: transparent;
                color: var(--text-dim);
                text-align: left;
                font-weight: 700;
                border: 1px solid transparent;
            }

            .filter-item.active {
                background: var(--bg);
                border-color: var(--border);
                color: var(--accent);
            }

            .filter-item:hover:not(.active) {
                background: rgba(255, 255, 255, 0.03);
            }

            .folder-grid {
                grid-template-columns: repeat(4, 1fr);
                gap: 20px;
                margin-bottom: 40px;
            }

            /* TABLE PC */
            .pc-table-card {
                background: var(--card);
                border: 1px solid var(--border);
                border-radius: var(--radius-lg);
                overflow: hidden;
                box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            }

            .pc-table {
                width: 100%;
                border-collapse: collapse;
            }

            .pc-table th {
                text-align: left;
                padding: 22px 20px;
                background: rgba(255, 255, 255, 0.02);
                font-size: 0.75rem;
                color: var(--text-dim);
                text-transform: uppercase;
                border-bottom: 1px solid var(--border);
            }

            .pc-table td {
                padding: 22px 20px;
                border-bottom: 1px solid var(--border);
                font-weight: 600;
                font-size: 1rem;
            }

            .accent-val {
                font-weight: 900;
                color: var(--accent);
                font-size: 1.1rem;
            }

            /* SIDEBAR R */
            .sidebar-r {
                background: var(--card);
                border-left: 1px solid var(--border);
                padding: 40px 25px;
                flex-direction: column;
            }
        }

        /* MODALS */
        .modal-wrap {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(15px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            padding: 20px;
        }

        .modal-box {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius-xl);
            width: 100%;
            max-width: 480px;
            padding: 40px;
            box-shadow: 0 40px 90px rgba(0, 0, 0, 0.8);
        }

        .modal-h {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 35px;
        }

        .modal-h h2 {
            font-weight: 900;
            font-size: 1.5rem;
            letter-spacing: -0.5px;
        }

        .btn-close {
            background: none;
            color: var(--text-dim);
            font-size: 2rem;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .field {
            margin-bottom: 25px;
        }

        .field label {
            display: block;
            font-size: 0.8rem;
            font-weight: 850;
            color: var(--text-dim);
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .field input,
        .field select {
            width: 100%;
            padding: 18px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            color: var(--text);
            font-weight: 600;
            font-size: 1rem;
        }

        .field input:focus {
            border-color: var(--accent);
        }

        .modal-btns {
            display: flex;
            gap: 15px;
            margin-top: 15px;
        }

        .cancel-btn {
            flex: 1;
            padding: 18px;
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-dim);
            border-radius: 18px;
            font-weight: 800;
        }

        .save-btn {
            flex: 2;
            padding: 18px;
            background: var(--accent);
            color: #000;
            border-radius: 18px;
            font-weight: 950;
            font-size: 1rem;
        }

        /* CALENDAR SYSTEM */
        .cal-head {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .cal-nav {
            width: 42px;
            height: 42px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text);
            font-size: 1.4rem;
            display: grid;
            place-items: center;
        }

        .cal-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
        }

        .cal-w {
            font-size: 0.7rem;
            font-weight: 900;
            color: var(--text-dim);
            text-align: center;
            padding-bottom: 12px;
        }

        .cal-day {
            aspect-ratio: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 0.95rem;
            font-weight: 800;
            border-radius: 14px;
            position: relative;
        }

        .cal-day.is-today {
            border: 2px solid var(--accent);
            color: var(--accent);
        }

        .cal-dots {
            display: flex;
            gap: 3px;
            position: absolute;
            bottom: 8px;
        }

        .cal-dot {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: var(--accent);
            box-shadow: 0 0 5px var(--accent);
        }

        /* ANIMATIONS */
        .fade-in {
            animation: animFade 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes animFade {
            from {
                opacity: 0;
                transform: translateY(15px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>
    <div class="app-shell">
        <!-- SIDEBAR L (PC) -->
        <aside class="desktop-only sidebar-l">
            <h1>Bills Pro V10</h1>
            <button class="pc-add-btn" id="trigger-add-pc">+ Adicionar Conta</button>
            <nav class="nav-group">
                <h3>Pastas Familiares</h3>
                <div id="filter-container" class="filter-stack"></div>
            </nav>
        </aside>

        <!-- MAIN AREA -->
        <main class="main-content">
            <header class="app-header">
                <div class="brand">
                    <h1>Bills Pro <span style="font-weight:400; font-size:0.8rem; opacity:0.6;">V10</span></h1>
                </div>
                <div class="header-tools">
                    <button class="tool-btn" onclick="exportData()" title="Exportar Backup">📥</button>
                    <button class="tool-btn" onclick="triggerImport()" title="Importar Backup">📤</button>
                    <button class="tool-btn" onclick="openMobileCal()" class="mobile-only"
                        title="Calendário">📅</button>
                </div>
            </header>

            <section class="dash-section">
                <!-- Sumário Principal -->
                <div class="hero-card">
                    <p class="label-xs">Total Geral Pendente</p>
                    <h1 id="total-geral" class="val-hero">R$ 0,00</h1>
                    <p class="val-paid-row">Total Pago este mês: <span id="total-pago">R$ 0,00</span></p>
                </div>

                <!-- Cards por Membro -->
                <div id="member-grid" class="folder-grid"></div>

                <!-- Título do Mês Mobile/PC -->
                <div class="list-header">
                    <span id="month-label" style="color:var(--accent); font-size:1rem;"></span>
                    <div class="desktop-only" style="display:flex; gap:10px;">
                        <button class="cal-nav" onclick="moveMonth(-1)"
                            style="width:30px; height:30px; font-size:1rem;">‹</button>
                        <button class="cal-nav" onclick="moveMonth(1)"
                            style="width:30px; height:30px; font-size:1rem;">›</button>
                    </div>
                </div>

                <!-- Listagem Real -->
                <div id="bill-container"></div>

                <!-- Histórico de Pagas -->
                <details style="margin-top:40px; cursor:pointer;" open>
                    <summary
                        style="text-align:center; color:var(--text-dim); font-weight:850; font-size:0.85rem; padding:20px; border-top:1px solid var(--border); list-style:none;">
                        HISTÓRICO DE PAGAS (<span id="count-paid">0</span>) ▾
                    </summary>
                    <div id="history-container" class="bill-stack is-paid" style="margin:20px 0;"></div>
                </details>
            </section>
        </main>

        <!-- SIDEBAR R (PC) -->
        <aside class="desktop-only sidebar-r">
            <div class="cal-head">
                <button class="cal-nav" onclick="moveMonth(-1)">‹</button>
                <h3 id="cal-title-pc"></h3>
                <button class="cal-nav" onclick="moveMonth(1)">›</button>
            </div>
            <div id="cal-grid-pc" class="cal-grid"></div>
        </aside>

        <!-- FAB MOBILE -->
        <button class="fab-add" id="trigger-add-mobile">+</button>
    </div>

    <!-- MODAL: ADD BILL -->
    <div id="modal-bill" class="modal-wrap">
        <div class="modal-box">
            <div class="modal-h">
                <h2>Nova Despesa</h2>
                <button class="btn-close" onclick="closeModals()">×</button>
            </div>
            <form id="bill-form">
                <div class="field"><label>Nome da Conta</label><input type="text" id="in-title" required
                        placeholder="Ex: Aluguel, Nubank"></div>
                <div class="form-row">
                    <div class="field"><label>Valor (R$)</label><input type="number" id="in-value" step="0.01" required>
                    </div>
                    <div class="field"><label>Vencimento</label><input type="date" id="in-date" required></div>
                </div>
                <div class="form-row">
                    <div class="field"><label>Membro (Pasta)</label><select id="in-member" required></select></div>
                    <div class="field"><label>Banco / Origem</label><select id="in-bank" required></select></div>
                </div>
                <div class="modal-btns">
                    <button type="button" class="cancel-btn" onclick="closeModals()">Cancelar</button>
                    <button type="submit" class="save-btn">Salvar Conta</button>
                </div>
            </form>
        </div>
    </div>

    <!-- MODAL: CALENDÁRIO MOBILE -->
    <div id="modal-cal" class="modal-wrap">
        <div class="modal-box">
            <div class="modal-h">
                <div style="display:flex; align-items:center; gap:15px;">
                    <button class="cal-nav" onclick="moveMonth(-1)">‹</button>
                    <h3 id="cal-title-mobile"></h3>
                    <button class="cal-nav" onclick="moveMonth(1)">›</button>
                </div>
                <button class="btn-close" onclick="closeModals()">×</button>
            </div>
            <div id="cal-grid-mobile" class="cal-grid"></div>
        </div>
    </div>

    <!-- HIDDEN INPUTS -->
    <input type="file" id="import-input" style="display:none" onchange="processImport(event)">

    <script>
        /**
         * LOGIC ENGINE - SENIOR RE-ARCHITECTED
         */
        const CONFIG = {
            members: ["Gabriel", "Gabi", "Papai", "Mãe"],
            banks: [
                { name: "Santander", color: "#ec1c24" },
                { name: "Nubank", color: "#8a05be" },
                { name: "Carrefour", color: "#0050ff" },
                { name: "Pernambucanas", color: "#0056b3" },
                { name: "Riachuelo", color: "#000000" },
                { name: "Cartão Mais", color: "#003366" },
                { name: "Mercado Pago", color: "#009ee3" }
            ],
            storageKey: 'billspro_v10_senior_fix'
        };

        let db = {
            bills: [],
            viewDate: new Date(),
            filter: "Tudo"
        };

        // --- HELPER WRAPPERS (FAIL-SAFE) ---
        const ui = (id) => document.getElementById(id);

        function formatBRL(v) {
            return (parseFloat(v) || 0).toLocaleString('pt-br', { style: 'currency', currency: 'BRL' });
        }

        // --- CORE MATH & RENDERING ---
        function atualizarDashboard() {
            const m = db.viewDate.getMonth();
            const y = db.viewDate.getFullYear();
            const months = ["Janeiro", "Fevereiro", "Março", "Abril", "Maio", "Junho", "Julho", "Agosto", "Setembro", "Outubro", "Novembro", "Dezembro"];
            const dateStr = `${months[m]} ${y}`;

            // Sync Header Titles
            if (ui('cal-title-pc')) ui('cal-title-pc').innerText = dateStr;
            if (ui('cal-title-mobile')) ui('cal-title-mobile').innerText = dateStr;
            if (ui('month-label')) ui('month-label').innerText = dateStr;

            // Filter data
            const currentMonthBills = db.bills.filter(b => {
                const [by, bm] = b.date.split('-').map(Number);
                return (bm - 1) === m && by === y;
            });

            const unpaidBills = currentMonthBills.filter(b => !b.paid);
            const paidBills = currentMonthBills.filter(b => b.paid);

            const totalUnpaid = unpaidBills.reduce((acc, b) => acc + (parseFloat(b.value) || 0), 0);
            const totalPaid = paidBills.reduce((acc, b) => acc + (parseFloat(b.value) || 0), 0);

            if (ui('total-geral')) ui('total-geral').innerText = formatBRL(totalUnpaid);
            if (ui('total-pago')) ui('total-pago').innerText = formatBRL(totalPaid);

            // Member Grid
            const grid = ui('member-grid');
            if (grid) {
                grid.innerHTML = '';
                CONFIG.members.forEach(mem => {
                    const memVal = unpaidBills.filter(b => b.member === mem).reduce((a, b) => a + (parseFloat(b.value) || 0), 0);
                    grid.innerHTML += `
                        <div class="folder-card fade-in">
                            <p class="folder-name">${mem}</p>
                            <p class="folder-val">${formatBRL(memVal)}</p>
                        </div>
                    `;
                });
            }

            // Sidebar Filters
            const filterBox = ui('filter-container');
            if (filterBox) {
                filterBox.innerHTML = '';
                ["Tudo", ...CONFIG.members].forEach(f => {
                    const btn = document.createElement('button');
                    btn.className = `filter-item ${db.filter === f ? 'active' : ''}`;
                    btn.innerText = f;
                    btn.onclick = () => { db.filter = f; atualizarDashboard(); };
                    filterBox.appendChild(btn);
                });
            }

            renderBills(currentMonthBills);
            renderCalendar('pc', m, y);
            renderCalendar('mobile', m, y);
        }

        function renderBills(all) {
            const list = ui('bill-container');
            const history = ui('history-container');
            if (!list || !history) return;

            list.innerHTML = ''; history.innerHTML = '';

            const filtered = all.filter(b => db.filter === "Tudo" || b.member === db.filter);
            const pendentes = filtered.filter(b => !b.paid);
            const pagas = filtered.filter(b => b.paid);

            if (ui('count-paid')) ui('count-paid').innerText = pagas.length;

            if (window.innerWidth >= 1024) {
                const tableWrap = document.createElement('div');
                tableWrap.className = 'pc-table-card fade-in';
                tableWrap.innerHTML = `
                    <table class="pc-table">
                        <thead><tr><th>Status</th><th>Descrição</th><th>Membro</th><th>Banco</th><th>Valor</th><th>Ações</th></tr></thead>
                        <tbody id="tbody-pc"></tbody>
                    </table>
                `;
                list.appendChild(tableWrap);
                const tbody = ui('tbody-pc');
                [...pendentes, ...pagas].forEach(b => {
                    const tr = document.createElement('tr');
                    if (b.paid) tr.className = 'is-paid';
                    tr.innerHTML = `
                        <td>${b.paid ? '✅' : '⏳'}</td>
                        <td style="font-weight:800">${b.title}</td>
                        <td>${b.member}</td>
                        <td style="color:${getBankColor(b.bank)}; font-weight:800">${b.bank}</td>
                        <td class="accent-val">${formatBRL(b.value)}</td>
                        <td><div class="b-btns">
                            ${!b.paid ? `<button class="circle-btn btn-pay" onclick="markAsPaid(${b.id})">✓</button>` : ''}
                            <button class="circle-btn btn-del" onclick="deleteBill(${b.id})">×</button>
                        </div></td>
                    `;
                    tbody.appendChild(tr);
                });
            } else {
                pendentes.forEach(b => list.appendChild(createMobileCard(b)));
                pagas.forEach(b => history.appendChild(createMobileCard(b)));
            }
        }

        function createMobileCard(b) {
            const clr = getBankColor(b.bank);
            const div = document.createElement('div');
            div.className = `bill-card fade-in ${b.paid ? 'is-paid' : ''}`;
            const [, , bd] = b.date.split('-').map(Number);
            div.innerHTML = `
                <div class="b-header"><span class="bank-badge" style="background:${clr}">${b.bank}</span><span class="b-val">${formatBRL(b.value)}</span></div>
                <span class="b-title">${b.title}</span>
                <div class="b-footer">
                    <span class="b-info">${b.member} • Dia ${bd}</span>
                    <div class="b-btns">
                        ${!b.paid ? `<button class="circle-btn btn-pay" onclick="markAsPaid(${b.id})">✓</button>` : ''}
                        <button class="circle-btn btn-del" onclick="deleteBill(${b.id})">×</button>
                    </div>
                </div>
            `;
            return div;
        }

        function renderCalendar(type, m, y) {
            const grid = ui(type === 'pc' ? 'cal-grid-pc' : 'cal-grid-mobile');
            if (!grid) return;
            grid.innerHTML = '';
            ["D", "S", "T", "Q", "Q", "S", "S"].forEach(h => grid.innerHTML += `<div class="cal-w">${h}</div>`);

            const first = new Date(y, m, 1).getDay();
            const last = new Date(y, m + 1, 0).getDate();
            const today = new Date();

            for (let i = 0; i < first; i++) grid.innerHTML += '<div></div>';
            for (let d = 1; d <= last; d++) {
                const day = document.createElement('div');
                day.className = 'cal-day';
                day.innerText = d;
                const pending = db.bills.some(b => {
                    const [by, bm, bd] = b.date.split('-').map(Number);
                    return !b.paid && bd === d && (bm - 1) === m && by === y;
                });
                if (pending) day.innerHTML += `<div class="cal-dots"><div class="cal-dot"></div></div>`;
                if (d === today.getDate() && m === today.getMonth() && y === today.getFullYear()) day.classList.add('is-today');
                grid.appendChild(day);
            }
        }

        // --- HANDLERS & PERSISTENCE ---
        function save() {
            localStorage.setItem(CONFIG.storageKey, JSON.stringify({ bills: db.bills }));
            atualizarDashboard();
        }

        function load() {
            const saved = localStorage.getItem(CONFIG.storageKey);
            if (saved) db.bills = JSON.parse(saved).bills || [];
            atualizarDashboard();
        }

        function markAsPaid(id) {
            const b = db.bills.find(x => x.id === id);
            if (b) { b.paid = true; save(); }
        }

        function deleteBill(id) {
            if (confirm('Deseja excluir esta conta?')) {
                db.bills = db.bills.filter(x => x.id !== id);
                save();
            }
        }

        function moveMonth(v) {
            db.viewDate.setMonth(db.viewDate.getMonth() + v);
            atualizarDashboard();
        }

        // --- UI TRIGGERS ---
        function openBillForm() {
            const f = ui('bill-form');
            if (f) f.reset();
            const memSel = ui('in-member');
            const bnkSel = ui('in-bank');
            if (memSel) memSel.innerHTML = CONFIG.members.map(m => `<option value="${m}">${m}</option>`).join('');
            if (bnkSel) bnkSel.innerHTML = CONFIG.banks.map(b => `<option value="${b.name}">${b.name}</option>`).join('');
            ui('modal-bill').style.display = 'flex';
        }

        function closeModals() {
            document.querySelectorAll('.modal-wrap').forEach(m => m.style.display = 'none');
        }

        function openMobileCal() { ui('modal-cal').style.display = 'flex'; }

        // FORM SUBMIT
        if (ui('bill-form')) {
            ui('bill-form').addEventListener('submit', (e) => {
                e.preventDefault();
                const val = ui('in-value').value;
                db.bills.push({
                    id: Date.now(),
                    title: ui('in-title').value,
                    value: parseFloat(val).toFixed(2),
                    date: ui('in-date').value,
                    member: ui('in-member').value,
                    bank: ui('in-bank').value,
                    paid: false
                });
                closeModals();
                save();
            });
        }

        // LISTENERS
        if (ui('trigger-add-pc')) ui('trigger-add-pc').onclick = openBillForm;
        if (ui('trigger-add-mobile')) ui('trigger-add-mobile').onclick = openBillForm;

        // BACKUP
        function exportData() {
            const blob = new Blob([JSON.stringify(db.bills, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a'); a.href = url; a.download = `backup_contas_pro.json`; a.click();
        }
        function triggerImport() { ui('import-input').click(); }
        function processImport(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                try {
                    const imported = JSON.parse(ev.target.result);
                    db.bills = Array.isArray(imported) ? imported : (imported.bills || []);
                    save();
                    alert('Backup Restaurado!');
                } catch (err) { alert('Erro ao importar arquivo.'); }
            };
            reader.readAsText(file);
        }

        window.onclick = (e) => { if (e.target.classList.contains('modal-wrap')) closeModals(); };
        window.onresize = atualizarDashboard;

        // BOOT
        document.addEventListener('DOMContentLoaded', load);
    </script>
</body>

</html>
